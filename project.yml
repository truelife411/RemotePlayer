name: RemotePlayer
options:
  bundleIdPrefix: com.remoteplayer
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_BITCODE: NO
    CLANG_ENABLE_MODULES: YES
    # CocoaPods 集成
    OTHER_LDFLAGS: "$(inherited)"
    FRAMEWORK_SEARCH_PATHS: "$(inherited)"
    SWIFT_OBJC_BRIDGING_HEADER: RemotePlayer/SupportingFiles/RemotePlayer-Bridging-Header.h

targets:
  RemotePlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      shared: true
    sources:
      - path: RemotePlayer
        excludes:
          - "**/.DS_Store"
          - "SupportingFiles/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remoteplayer.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7TB7XW97GG
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "远程播放器"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "本应用需要访问局域网以连接您的 Windows 共享文件夹播放视频和图片。"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        INFOPLIST_KEY_UIBackgroundModes:
          - audio
        INFOPLIST_KEY_UIRequiresFullScreen: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
